apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: push-py-pulp
spec:
  description: |
    Push Python packages from an OCI artifact to a Pulp repository.
  params:
    - name: SNAPSHOT_PATH
      type: string
      description: Path to the snapshot spec file containing image information
    - name: PULP_SECRET_NAME
      type: string
      description: >-
        The name of the secret containing the Pulp credentials. It must have the cert and key data
        attributes.
      default: pulp-credentials
    - name: PULP_BASE_URL
      type: string
      description: The base URL of the Pulp server
    - name: PULP_API_ROOT
      type: string
      description: The API root path of the Pulp server
      default: "/api/pulp/"
    - name: PULP_DOMAIN
      type: string
      description: The domain to use for Pulp operations
    - name: PULP_REPOSITORY
      type: string
    - name: sourceDataArtifact
      type: string
      description: Trusted Artifact to use to obtain the Snapshot
    - name: TRUSTED_ARTIFACTS_EXTRACT_DIR
      description: Directory to use to extract trusted artifact archive.
      type: string
      # need to specify a subfolder during the extract to avoid the error:
      # tar: .: Cannot change mode to rwxr-sr-x: Operation not permitted
      default: "/var/workdir/ta"
    - name: COSIGN_SECRET_NAME
      type: string
      description: >-
        The name of the secret containing the cosign signing key.
        The secret must have a 'cosign.key' data field containing the private key.
        If not provided, attestations will be generated but not signed.
      default: ""
  volumes:
    - name: pulp-secret
      secret:
        secretName: $(params.PULP_SECRET_NAME)
    - name: cosign-secret
      secret:
        secretName: $(params.COSIGN_SECRET_NAME)
        optional: true
    - name: workdir
      emptyDir: {}
  stepTemplate:
    env:
      - name: SNAPSHOT_PATH
        value: $(params.SNAPSHOT_PATH)
      - name: PULP_BASE_URL
        value: $(params.PULP_BASE_URL)
      - name: PULP_API_ROOT
        value: $(params.PULP_API_ROOT)
      - name: PULP_DOMAIN
        value: $(params.PULP_DOMAIN)
      - name: PULP_REPOSITORY
        value: $(params.PULP_REPOSITORY)
      - name: IMAGES_TXT
        value: /var/workdir/images.txt
      - name: FILES_DIR
        value: /var/workdir/files
      - name: TRUSTED_ARTIFACTS_EXTRACT_DIR
        value: $(params.TRUSTED_ARTIFACTS_EXTRACT_DIR)
    volumeMounts:
      - name: pulp-secret
        mountPath: "/etc/pulp-secret"
        readOnly: true
      - name: workdir
        mountPath: "/var/workdir"
    workingDir: "/var/workdir"
  steps:
    - name: use-trusted-artifact
      args:
        - use
        - $(params.sourceDataArtifact)=$(params.TRUSTED_ARTIFACTS_EXTRACT_DIR)
      computeResources: {}
      image: quay.io/redhat-appstudio/build-trusted-artifacts:e02102ede09aa07187cba066ad547a54724e5cf4
    - name: get-image-urls
      image: quay.io/konflux-ci/buildah-task:latest@sha256:b82d465a06c926882d02b721cf8a8476048711332749f39926a01089cf85a3f9
      script: |
        #!/bin/bash
        set -euo pipefail

        < "${TRUSTED_ARTIFACTS_EXTRACT_DIR}/${SNAPSHOT_PATH}" jq -r '.components[].containerImage' | tee "${IMAGES_TXT}"

    - name: extract-artifacts
      image: quay.io/konflux-ci/oras:latest@sha256:1beeecce012c99794568f74265c065839f9703d28306a8430b667f639343a98b
      script: |
        #!/bin/bash
        set -euo pipefail

        AUTHFILE='/tmp/auth.json'
        mkdir -p "${FILES_DIR}"
        while read -r IMAGE; do
          echo "Processing ${IMAGE}"
          select-oci-auth "${IMAGE}" > "${AUTHFILE}"
          retry oras pull --registry-config "${AUTHFILE}" "${IMAGE}" -o "${FILES_DIR}"
        done < "${IMAGES_TXT}"

        ls -la "${FILES_DIR}"

    - name: generate-and-sign-attestations
      image: registry.access.redhat.com/ubi9/ubi:latest
      volumeMounts:
        - name: cosign-secret
          mountPath: "/etc/cosign-secret"
          readOnly: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Attestation Generation and Signing Step ==="
        
        # Install cosign
        echo "Installing cosign..."
        curl -sLO https://github.com/sigstore/cosign/releases/download/v2.2.4/cosign-linux-amd64
        chmod +x cosign-linux-amd64
        mv cosign-linux-amd64 /usr/local/bin/cosign
        
        echo "Cosign version:"
        cosign version

        # Check if signing key is available
        COSIGN_KEY_PATH="/etc/cosign-secret/cosign.key"
        if [ -f "${COSIGN_KEY_PATH}" ]; then
          echo "✓ Cosign signing key found - attestations will be signed"
          SIGNING_ENABLED=true
        else
          echo "⚠ No cosign signing key provided - attestations will be unsigned"
          echo "  To enable signing, provide COSIGN_SECRET_NAME parameter"
          SIGNING_ENABLED=false
        fi

        echo ""
        echo "Generating release-time attestations for wheels..."

        # Get release timestamp
        RELEASE_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        echo "Release timestamp: ${RELEASE_TIME}"

        ATT_COUNT=0
        SIGNED_COUNT=0

        cd "${FILES_DIR}"
        
        echo ""
        echo "Files in directory:"
        ls -lah
        
        echo ""
        echo "Processing wheel files..."
        
        # Process only .whl and .tar.gz files
        shopt -s nullglob
        for WHEEL in *.whl *.tar.gz; do
          # Skip if no files match (glob didn't expand)
          if [ ! -f "${WHEEL}" ]; then
            echo "Skipping non-existent file: ${WHEEL}"
            continue
          fi

          echo ""
          echo "Processing: ${WHEEL}"

          # Calculate wheel hash
          WHEEL_SHA256=$(sha256sum "${WHEEL}" | cut -d' ' -f1)
          echo "  SHA256: ${WHEEL_SHA256}"

          # Create SLSA provenance predicate using echo to avoid YAML parsing issues
          PREDICATE_FILE="/tmp/${WHEEL}.predicate.json"
          echo '{' > "${PREDICATE_FILE}"
          echo '  "_type": "https://in-toto.io/Statement/v0.1",' >> "${PREDICATE_FILE}"
          echo '  "predicateType": "https://slsa.dev/provenance/v0.2",' >> "${PREDICATE_FILE}"
          echo '  "subject": [' >> "${PREDICATE_FILE}"
          echo '    {' >> "${PREDICATE_FILE}"
          echo "      \"name\": \"${WHEEL}\"," >> "${PREDICATE_FILE}"
          echo '      "digest": {' >> "${PREDICATE_FILE}"
          echo "        \"sha256\": \"${WHEEL_SHA256}\"" >> "${PREDICATE_FILE}"
          echo '      }' >> "${PREDICATE_FILE}"
          echo '    }' >> "${PREDICATE_FILE}"
          echo '  ],' >> "${PREDICATE_FILE}"
          echo '  "predicate": {' >> "${PREDICATE_FILE}"
          echo '    "builder": {' >> "${PREDICATE_FILE}"
          echo '      "id": "https://konflux-ci.dev/calunga"' >> "${PREDICATE_FILE}"
          echo '    },' >> "${PREDICATE_FILE}"
          echo '    "buildType": "https://konflux-ci.dev/PythonWheelBuild@v1",' >> "${PREDICATE_FILE}"
          echo '    "metadata": {' >> "${PREDICATE_FILE}"
          echo "      \"buildFinishedOn\": \"${RELEASE_TIME}\"," >> "${PREDICATE_FILE}"
          echo '      "completeness": {' >> "${PREDICATE_FILE}"
          echo '        "parameters": true,' >> "${PREDICATE_FILE}"
          echo '        "environment": true,' >> "${PREDICATE_FILE}"
          echo '        "materials": true' >> "${PREDICATE_FILE}"
          echo '      },' >> "${PREDICATE_FILE}"
          echo '      "reproducible": true' >> "${PREDICATE_FILE}"
          echo '    }' >> "${PREDICATE_FILE}"
          echo '  }' >> "${PREDICATE_FILE}"
          echo '}' >> "${PREDICATE_FILE}"

          ATT_FILE="${WHEEL}.att"

          if [ "${SIGNING_ENABLED}" = true ]; then
            # Sign the attestation with cosign using the provided key
            echo "  Signing attestation with cosign..."
            if COSIGN_PASSWORD="" cosign attest-blob "${WHEEL}" \
              --predicate="${PREDICATE_FILE}" \
              --type=https://slsa.dev/provenance/v0.2 \
              --key="${COSIGN_KEY_PATH}" \
              --yes \
              --output-file="${ATT_FILE}" 2>&1; then
              echo "  ✓ Signed attestation: ${ATT_FILE}"
              SIGNED_COUNT=$((SIGNED_COUNT + 1))
            else
              echo "  ✗ Failed to sign, creating unsigned attestation"
              cp "${PREDICATE_FILE}" "${ATT_FILE}"
            fi
          else
            # Create unsigned attestation
            cp "${PREDICATE_FILE}" "${ATT_FILE}"
            echo "  ✓ Created unsigned attestation: ${ATT_FILE}"
          fi

          ATT_COUNT=$((ATT_COUNT + 1))
          rm -f "${PREDICATE_FILE}"
        done

        echo ""
        echo "=========================================="
        echo "Attestation Generation Summary:"
        echo "  Total attestations: ${ATT_COUNT}"
        if [ "${SIGNING_ENABLED}" = true ]; then
          echo "  Signed: ${SIGNED_COUNT}"
        else
          echo "  Signed: 0 (no signing key provided)"
        fi
        echo "=========================================="

        echo ""
        echo "Final files in directory (wheels, signatures, and attestations):"
        ls -lah

    # TODO: Use nudging to keep this up to date.
    - name: upload
      image: quay.io/redhat-user-workloads/calunga-tenant/plumbing-utils@sha256:ce1e7cdf0c9281370c7fd6ed98944247ca744d8a6ca761968df6373639526776
      command:
        - pulp-upload
